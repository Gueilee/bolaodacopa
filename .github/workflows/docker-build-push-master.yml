name: Build and Push Docker Image to Azure Container Registry

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login no Docker Hub (evita rate limit ao baixar node:20-slim)
        run: |
          if [ -n "${{ vars.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ vars.DOCKERHUB_USERNAME }}" --password-stdin
            echo "Docker Hub login OK"
          else
            echo "Sem credenciais Docker Hub — prosseguindo sem login (sujeito a rate limit)"
          fi

      - name: Copiar Dockerfile.prod para Dockerfile
        run: cp Dockerfile.prod Dockerfile

      - name: Verificar secrets obrigatórios
        run: |
          MISSING=""
          [ -z "${{ secrets.ENV_PROD_TURSO_AUTH_TOKEN }}" ]         && MISSING="$MISSING ENV_PROD_TURSO_AUTH_TOKEN"
          [ -z "${{ secrets.ENV_PROD_JWT_SECRET }}" ]                && MISSING="$MISSING ENV_PROD_JWT_SECRET"
          [ -z "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" ]    && MISSING="$MISSING AZURE_STORAGE_CONNECTION_STRING"
          [ -z "${{ secrets.AZURE_ACR_PASSWORD_PROD }}" ]            && MISSING="$MISSING AZURE_ACR_PASSWORD_PROD"
          if [ -n "$MISSING" ]; then
            echo "::error::Secrets ausentes neste repositório:$MISSING"
            exit 1
          fi
          echo "Todos os secrets obrigatórios estão configurados ✓"

      - name: Preencher variáveis sensíveis no .env.docker.prod
        run: |
          escape() {
            printf '%s\n' "$1" | sed -e 's/[\/&]/\\&/g'
          }

          TURSO_AUTH_TOKEN_ESCAPED=$(escape "${{ secrets.ENV_PROD_TURSO_AUTH_TOKEN }}")
          JWT_SECRET_ESCAPED=$(escape "${{ secrets.ENV_PROD_JWT_SECRET }}")
          AZURE_STORAGE_CONN_ESCAPED=$(escape "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}")
          MAILER_DSN_ESCAPED=$(escape "${{ secrets.AZURE_SMTP_MAILER_DSN }}")
          API_FOOTBALL_KEY_ESCAPED=$(escape "${{ secrets.ENV_PROD_API_FOOTBALL_KEY }}")
          CRON_SECRET_ESCAPED=$(escape "${{ secrets.ENV_PROD_CRON_SECRET }}")
          ADMIN_PASSWORD_ESCAPED=$(escape "${{ secrets.ENV_PROD_ADMIN_PASSWORD }}")

          sed -i "s|^TURSO_AUTH_TOKEN=.*|TURSO_AUTH_TOKEN=$TURSO_AUTH_TOKEN_ESCAPED|g" .env.docker.prod
          sed -i "s|^JWT_SECRET=.*|JWT_SECRET=$JWT_SECRET_ESCAPED|g" .env.docker.prod
          sed -i "s|^BLOB_READ_WRITE_TOKEN=.*|BLOB_READ_WRITE_TOKEN=$AZURE_STORAGE_CONN_ESCAPED|g" .env.docker.prod
          sed -i "s|^MAILER_DSN=.*|MAILER_DSN=$MAILER_DSN_ESCAPED|g" .env.docker.prod
          sed -i "s|^API_FOOTBALL_KEY=.*|API_FOOTBALL_KEY=$API_FOOTBALL_KEY_ESCAPED|g" .env.docker.prod
          sed -i "s|^NEXT_PUBLIC_API_FOOTBALL_KEY=.*|NEXT_PUBLIC_API_FOOTBALL_KEY=$API_FOOTBALL_KEY_ESCAPED|g" .env.docker.prod
          sed -i "s|^CRON_SECRET=.*|CRON_SECRET=$CRON_SECRET_ESCAPED|g" .env.docker.prod
          sed -i "s|^ADMIN_PASSWORD=.*|ADMIN_PASSWORD=$ADMIN_PASSWORD_ESCAPED|g" .env.docker.prod

          # Diagnóstico: verifica se BLOB_READ_WRITE_TOKEN foi preenchido
          BLOB_VAL=$(grep "^BLOB_READ_WRITE_TOKEN=" .env.docker.prod | cut -d'=' -f2-)
          if [ -z "$BLOB_VAL" ]; then
            echo "::error::BLOB_READ_WRITE_TOKEN ficou vazio após sed! Secret AZURE_STORAGE_CONNECTION_STRING pode estar incorreto."
            exit 1
          fi
          echo "BLOB_READ_WRITE_TOKEN: preenchido ✓"

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: vdmprod.azurecr.io
          username: ${{ vars.AZURE_ACR_USERNAME_PROD }}
          password: ${{ secrets.AZURE_ACR_PASSWORD_PROD }}

      - name: Build Docker image (com retry para falhas de rede)
        run: |
          for attempt in 1 2 3; do
            echo ">>> Tentativa $attempt/3"
            docker build -t bolaodacopa . && break
            [ $attempt -lt 3 ] && echo "Build falhou, aguardando 15s antes de tentar novamente..." && sleep 15
          done
          docker images bolaodacopa

      - name: Tag Docker image
        run: docker tag bolaodacopa vdmprod.azurecr.io/samples/bolaodacopa

      - name: Push Docker image to Azure Container Registry
        run: docker push vdmprod.azurecr.io/samples/bolaodacopa

      - name: Recriar container no Portainer
        run: |
          TOKEN=$(curl -k -s -X POST "https://191.233.21.33:9000/api/auth" \
            -H "Content-Type: application/json" \
            -d '{"Username":"${{ vars.PORTAINER_USER_PROD }}","Password":"${{ secrets.PORTAINER_PASS_PROD }}"}' \
            | grep -o '"jwt":"[^\"]*"' | cut -d':' -f2 | sed 's/["}]//g')
          CONTAINER_ID=$(curl -k -s -X GET "https://191.233.21.33:9000/api/endpoints/3/docker/v1.41/containers/json?all=true&filters=%7B%22name%22%3A%5B%22bolaodacopa%22%5D%7D" \
            -H "Authorization: Bearer $TOKEN" \
            | grep -o '"Id":"[^"]*"' | head -n1 | cut -d':' -f2 | sed 's/"//g')
          curl -k -X POST "https://191.233.21.33:9000/api/docker/3/containers/$CONTAINER_ID/recreate" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"PullImage":true}'

      - name: Remover imagens Docker não utilizadas
        run: |
          TOKEN=$(curl -k -s -X POST "https://191.233.21.33:9000/api/auth" \
            -H "Content-Type: application/json" \
            -d '{"Username":"${{ vars.PORTAINER_USER_PROD }}","Password":"${{ secrets.PORTAINER_PASS_PROD }}"}' \
            | grep -o '"jwt":"[^\"]*"' | cut -d':' -f2 | sed 's/["}]//g')
          curl -k -X POST "https://191.233.21.33:9000/api/endpoints/3/docker/images/prune" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json"
